#
# Validates SKILL.md frontmatter against authoritative Anthropic 2026 schema.
# Catches: missing description, name field present (Issue #22063), invalid allowed-tools.

name: Skill Schema Validate

on:
  push:
    paths:
      - 'plugins/**/skills/**/SKILL.md'
      - 'schemas/skill-schema.json'
      - '.github/workflows/skill-schema-validate.yml'
  pull_request:
    paths:
      - 'plugins/**/skills/**/SKILL.md'

jobs:
  validate-skill-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validators
        run: |
          pip install pyyaml jsonschema

      - name: Validate SKILL.md frontmatter
        run: |
          python3 << 'PYEOF'
          import os, sys, yaml, json, glob
          from jsonschema import validate, ValidationError

          schema = json.load(open('schemas/skill-schema.json'))
          errors = []
          skill_files = glob.glob('plugins/**/skills/**/SKILL.md', recursive=True)
          
          if not skill_files:
              print("ERROR: No SKILL.md files found")
              sys.exit(1)

          for f in skill_files:
              with open(f) as fh:
                  content = fh.read()
              if not content.startswith('---'):
                  errors.append(f"{f}: missing frontmatter (no leading ---)")
                  continue
              parts = content.split('---', 2)
              if len(parts) < 3:
                  errors.append(f"{f}: malformed frontmatter (no closing ---)")
                  continue
              try:
                  fm = yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                  errors.append(f"{f}: YAML parse error: {e}")
                  continue
              if 'name' in fm:
                  errors.append(f"{f}: 'name' field FORBIDDEN per Issue #22063 (namespace bypass)")
              try:
                  validate(instance=fm, schema=schema)
                  print(f"OK: {f}")
              except ValidationError as e:
                  errors.append(f"{f}: {e.message}")

          if errors:
              print("\n=== VALIDATION FAILED ===")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"\nAll {len(skill_files)} SKILL.md files VALID")
          PYEOF
